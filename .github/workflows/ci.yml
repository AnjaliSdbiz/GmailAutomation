name: Gmail Automation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # =======================================
  # JOB 1 — Runs on every push
  # No emulator needed — fast and reliable
  # Checks code quality and setup
  # =======================================
  build-and-validate:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate framework structure
        run: |
          echo "Checking framework files exist..."
          test -f wdio.conf.js && echo "✓ wdio.conf.js found"
          test -f test/specs/inbox.spec.js && echo "✓ inbox.spec.js found"
          test -f test/pageobjects/InboxPage.js && echo "✓ InboxPage.js found"
          test -f test/pageobjects/ComposePage.js && echo "✓ ComposePage.js found"
          test -f test/data/testData.js && echo "✓ testData.js found"
          echo "All framework files validated!"

      - name: Install Appium and verify
        run: |
          npm install -g appium@3.2.0
          appium driver install uiautomator2@7.0.0
          echo "✓ Appium version: $(appium --version)"
          echo "✓ Appium drivers installed:"
          appium driver list --installed

      - name: Upload framework as artifact
        uses: actions/upload-artifact@v4
        with:
          name: framework-files
          path: |
            test/
            wdio.conf.js
            package.json
          retention-days: 7
