name: Gmail Automation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install dependencies
        run: npm ci

      - name: Install Appium
        run: |
          npm install -g appium@3.2.0
          appium driver install uiautomator2@7.0.0

      - name: Enable KVM for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Android SDK components
        uses: android-actions/setup-android@v3

      - name: Install emulator
        run: |
          sdkmanager "platform-tools" "emulator"
          sdkmanager "system-images;android-29;default;x86_64"
          echo "no" | avdmanager create avd -n test -k "system-images;android-29;default;x86_64" --force

      - name: Start emulator
        run: |
          $ANDROID_HOME/emulator/emulator -avd test \
            -no-window \
            -no-audio \
            -no-boot-anim \
            -gpu swiftshader_indirect \
            -camera-back none &
          adb wait-for-device
          adb shell input keyevent 82 &

      - name: Wait for emulator to boot
        run: |
          bootanim=""
          failcounter=0
          timeout_in_sec=300
          until [[ "$bootanim" =~ "stopped" ]]; do
            bootanim=$(adb -e shell getprop init.svc.bootanim 2>&1)
            if [[ "$bootanim" =~ "not found" ]]; then
              let "failcounter += 1"
              if [[ $failcounter -gt $timeout_in_sec ]]; then
                echo "Timeout waiting for emulator"
                exit 1
              fi
            fi
            sleep 1
          done
          echo "Emulator booted!"

      - name: Run tests
        run: npm test

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30
